{% extends "base.html" %}

{% block title %}Пароль изменён — {{ site_name }}{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="alert alert-success" role="alert">
        <h2 class="h5 alert-heading">Пароль успешно изменён</h2>
        <p class="mb-0">Теперь вы можете войти с новым паролем.</p>
      </div>
      <a href="{% url 'accounts:profile' %}" class="btn btn-primary">В личный кабинет</a>
    </div>
  </div>
</div>
{% endblock %}
